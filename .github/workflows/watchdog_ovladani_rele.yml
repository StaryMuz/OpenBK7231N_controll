name: watchdog_ovladani_rele

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

jobs:
  watchdog:
    runs-on: ubuntu-22.04

    steps:
      - name: Check if ovladani_rele is running
        env:
          GH_TOKEN: ${{ secrets.MY_PAT }}
          REPO: ${{ github.repository }}
        run: |

          RUNNING=$(curl -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/$REPO/actions/workflows/ovladani_rele.yml/runs?status=in_progress \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['total_count'])")

          echo "Running ovladani_rele runs: $RUNNING"

          if [ "$RUNNING" -eq 0 ]; then

            echo "ovladani_rele neběží - spouštím."

            curl -s -X POST \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/repos/$REPO/actions/workflows/ovladani_rele.yml/dispatches \
              -d '{"ref":"main"}'

          else

            echo "ovladani_rele již běží."

          fi
