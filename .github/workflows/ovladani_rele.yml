name: ovladani_rele

concurrency:
  group: ovladani_rele
  cancel-in-progress: false

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
         fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas openpyxl paho-mqtt matplotlib

      - name: Run relay control script
        run: python ovladani_rele.py
        # ?? Script si sám řídí intervaly mezi jednotlivými cykly
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          MQTT_BROKER:        ${{ secrets.MQTT_BROKER }}
          MQTT_PORT:          ${{ secrets.MQTT_PORT }}
          MQTT_USER:          ${{ secrets.MQTT_USER }}
          MQTT_PASS:          ${{ secrets.MQTT_PASS }}
          MQTT_BASE:          ${{ secrets.MQTT_BASE }}
          MY_PAT:             ${{ secrets.MY_PAT }}
          GITHUB_REPOSITORY:  ${{ github.repository }}

      - name: Debug – list files
        run: ls -la

      - name: Commit and push last state
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add posledni_stav.txt
          git commit -m "Aktualizace posledni_stav.txt" || echo "Žádná změna – commit se neprovádí."
          git push || echo "Nic k pushnutí."
